<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Palette Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Colour Palette Generator</h1>
    <button id="generate-btn">Generate Palette 🔄</button>

    <div class="palette-container">

        <div class="color-box">
            <div class="color" style="background-color: whitesmoke;"></div>
            <div class="color-info">
                <span class="color-name">#ffffff</span>
                <i class="far fa-copy copy-btn"></i>
            </div>
        </div>

        <div class="color-box">
            <div class="color" style="background-color: pink;"></div>
            <div class="color-info">
                <span class="color-name">#ffc0cb</span>
                <i class="far fa-copy copy-btn"></i>
            </div>
        </div>

        <div class="color-box">
            <div class="color" style="background-color: aqua;"></div>
            <div class="color-info">
                <span class="color-name">#00ffff</span>
                <i class="far fa-copy copy-btn"></i>
            </div>
        </div>

        <div class="color-box">
            <div class="color" style="background-color: coral;"></div>
            <div class="color-info">
                <span class="color-name">#ff7f50</span>
                <i class="far fa-copy copy-btn"></i>
            </div>
        </div>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
